<!DOCTYPE html>
<html>
<head>
    <title>Data Mahasiswa</title>
</head>
<body>

<h2>Data Mahasiswa</h2>
<input type="text" id="cari" placeholder="Cari Mahasiswa">
<button id="btnCari">Cari</button>
<br><br>

<input type="text" id="nim"
placeholder="NIM"><br><br>
<input type="text" id="nama"
placeholder="Nama"><br><br>
<input type="text" id="prodi"
placeholder="Prodi"><br><br>
<input type="text" id="matkul"
placeholder="Mata Kuliah"><br><br>
<input type="number" id="nilai"
placeholder="Nilai"><br><br>

<button id="btnTambah">Tambah</button>
<button id="btnEdit">Edit</button>
<button id="btnHapus">Hapus</button>

<br><br>

<table border="1">
    <tr>
        <th>NIM</th>
        <th>Nama</th>
        <th>Prodi</th>
        <th>Mata Kuliah</th>
        <th>Nilai</th>
        </tr>
        </table>

        <script src="script.js"></script>

</body>
